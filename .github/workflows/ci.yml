name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: Upload desktop dist
        uses: actions/upload-artifact@v4
        with:
          name: desktop-dist-node-${{ matrix.node }}
          path: apps/desktop/dist

  rust-lint:
    name: Rust lint & test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps (Tauri + keyring secret-service)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev libdbus-1-dev libgtk-3-dev \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev libappindicator3-dev \
            librsvg2-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: cd apps/desktop/src-tauri && cargo test
      - run: cd apps/desktop/src-tauri && cargo clippy --all-targets -- -D warnings

  rust-build-macos:
    name: Tauri bundle (macOS)
    runs-on: macos-latest
    needs: [frontend, rust-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - run: npm ci
      - run: npx tauri build
        working-directory: apps/desktop
      - name: Sign with ad-hoc identity
        run: |
          # Match whatever .app tauri build emitted (productName is
          # "Grok GUI Lite", not "Grok GUI"); a glob survives renames.
          codesign --force --deep --sign - \
            apps/desktop/src-tauri/target/release/bundle/macos/*.app
      - name: Build DMG
        run: |
          # Tauri's `tauri build` already produces the .dmg via the
          # bundle target; this step is a no-op marker for the artifact.
          ls -la "apps/desktop/src-tauri/target/release/bundle/dmg/"
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: grok-gui-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  electron-build-macos:
    name: Electron bundle (macOS)
    runs-on: macos-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron-version/package-lock.json
      - name: Install Electron deps
        working-directory: electron-version
        run: npm ci
      - name: Build Electron app + DMG
        working-directory: electron-version
        # `--publish never` disables electron-builder's auto-publish-to-
        # GitHub-Releases trigger (it fires on CI=true with no GH_TOKEN,
        # which fails the build). We only want to build + bundle here;
        # release upload is done separately.
        run: npm run dist -- --publish never
      - name: Verify ad-hoc signature (post afterSign hook)
        # electron-builder.yml wires scripts/afterSign.js into mac.afterSign
        # so the .app inside the DMG is re-signed with `codesign --force
        # --deep --sign -` before DMG packaging. This step is a hard gate:
        # if the signature is still malformed (e.g. hook regression),
        # fail the build.
        run: |
          set -e
          APP=$(ls -d "electron-version/release/mac"*/"Grok GUI.app" 2>/dev/null | head -n1 || true)
          if [ -z "$APP" ]; then
            APP=$(ls -d "electron-version/release/mac-arm64/Grok GUI.app" "electron-version/release/mac/Grok GUI.app" 2>/dev/null | head -n1 || true)
          fi
          if [ -z "$APP" ]; then
            echo "::error::Could not find Grok GUI.app under electron-version/release/"
            ls -la electron-version/release/ || true
            exit 1
          fi
          echo "Verifying: $APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
      - name: Upload DMGs
        uses: actions/upload-artifact@v4
        with:
          name: grok-gui-electron-macos
          path: electron-version/release/*.dmg

  # Tauri bundle on Linux requires a long list of apt packages; we
  # keep the test+clippy matrix above and skip the build for now.
